name: assessme-local

# Local development overrides for Docker Desktop
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Differences from production:
# - Builds image from local Dockerfile instead of pulling from GHCR
# - Mounts source code as volume for live file changes without rebuilding
# - Dedicated Vite container for hot module replacement (no local Node required)
# - APP_ENV set to local, APP_DEBUG enabled
# - Ports mapped to local machine for direct access
# - No proxy-network (uses its own local network)
# - No VIRTUAL_HOST or LETSENCRYPT_HOST (no Nginx proxy locally)
# - Postgres port steers clear of 5432 (used by XAMPP on Windows host)

services:

  assessme-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: "true"
    image: ghcr.io/monatemedia/assessme:dev
    ports:
      - "8001:80"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8001
      VIRTUAL_HOST: ""
      LETSENCRYPT_HOST: ""
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    networks:
      - assessme-local

  assessme-queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: "true"
    image: ghcr.io/monatemedia/assessme:dev
    environment:
      APP_ENV: local
      APP_DEBUG: true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/public/build
    networks:
      - assessme-local

  # ----------------------------------------------
  # VITE — Hot module replacement for local dev
  # Watches Blade, CSS, and JS files
  # Access HMR at http://localhost:5173
  # ----------------------------------------------
  assessme-vite:
    build:
      context: .
      dockerfile: Dockerfile.vite
    container_name: assessme-vite
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - assessme-local

  assessme-db:
    ports:
      - "5436:5432"
    networks:
      - assessme-local

  assessme-redis:
    ports:
      - "6390:6379"
    networks:
      - assessme-local

volumes:
  assessme-db-data:
    name: assessme-db-data
  assessme-redis-data:
    name: assessme-redis-data

networks:
  assessme-local:
    driver: bridge
  proxy-network:
    external: false
    driver: bridge
